# ── Reload config ───────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# ── General settings ────────────────────────────────────────────
set -g base-index 1
set -g history-limit 10000
set -g mouse off
set -g status-interval 60
set -g status-justify centre
set -g status-position bottom

setw -g monitor-activity on
set -g visual-activity on
setw -g mode-keys vi

# ── Pane splits (stay in same path) ─────────────────────────────
unbind %
unbind '"'
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# ── Pane navigation (vim-style) ──────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Utilities ───────────────────────────────────────────────────
# Toggle logging for current pane
bind P pipe-pane -o "cat >>~/#W.log" \; display "Toggled logging to ~/#W.log"

# Sync input across all panes in window
bind C-s set-window-option synchronize-panes

# ── Status line ─────────────────────────────────────────────────
set -g status-fg white
set -g status-bg black
setw -g window-status-current-style fg=white,bg=red
set -g message-style fg=white,bg=black
set -g status-left-length 40
set -g status-left "#[fg=green]Session: #S #[fg=yellow]#I #[fg=cyan]#P"
set -g status-right "#[fg=cyan]%d %b %R"

# ── Per-terminal overrides ───────────────────────────────────────
# Ghostty → fish
if-shell '[ "$TERM_PROGRAM" = "ghostty" ]' {
    set -g default-terminal "xterm-256color"
    set -g default-shell "/usr/bin/fish"
}

# Gnome Terminal (or anything else) → zsh
if-shell '[ "$TERM_PROGRAM" != "ghostty" ]' {
    set -g default-terminal "xterm-256color"
    set -g default-shell "/usr/bin/zsh"
}
